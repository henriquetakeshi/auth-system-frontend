<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets_senha/esqueceu a senha/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Esqueceu a Senha</title>
</head>
<body>
    <div class="container">

        <div class="form-image">
            <img src="./assets_senha/img/undraw_forgot-password_nttj_v2.svg" alt="">
        </div>

        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="title">
                        <h1>Esqueceu a senha?</h1>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-box">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="Digite o e-mail cadastrado." required>
                        <i class='bx bx-envelope'></i>
                    </div>
                </div>

                <div class="input-box">
                    <h4>Enviaremos para o seu email um código para a criação de uma nova senha.</h4>
                </div>

                <div class="send-button">
                    <button type="button" onclick="enviarCodigo()">Enviar</button>
                </div>

        </div>
    </div>

    <script src="./assets_senha/esqueceu a senha/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="./formulário de login responsivo/assets_login/css/style.css" rel="stylesheet">
    <title>formulário de login responsivo</title>
</head>

<body>
    <div class="container">
        <div class="form-image">
            <img src="./formulário de login responsivo/assets_login/img/undraw_sign_in_re_o58h.svg" alt="">
        </div>
        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="title">
                        <h1>Login</h1>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-box">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
                        <!-- <i class="fa-solid fa-envelope"></i> -->
                        <i class='bx bx-envelope'></i>
                    </div>

                    <div class="input-box">
                        <label for="password">Senha</label>
                        <input type="password" name="password" id="password" placeholder="Digite sua senha" required>
                        <!-- <i class="fa-solid fa-lock"></i> -->
                        <i class='bx bx-hide show-hide'></i>
                    </div>

                    <div class="input-box">
                        <a href="./esqueceu_a_senha.html" class="forgot-password">Esqueceu a senha?</a>
                    </div>
                </div>

                <div class="login-button">
                    <button><a href="#">Entrar</a></button>
                </div>

                <div class="input-box">
                    <span>Não possui uma conta? <a href="./index_cadastro.html"
                            class="signup-link">Cadastre-se</a></span>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>

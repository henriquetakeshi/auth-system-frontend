<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets_senha/codigo_email/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Código Email</title>
</head>
<body>
    <div class="container">
        <div class="form-image">
            <img src="./assets_senha/codigo_email/img/undraw_authentication_tbfc.svg" alt="">
        </div>

        <div class="form">
            <div class="form-header">
                <div class="title">
                    <h1>Digite o código</h1>
                </div>
                <p>Enviamos um código de verificação para
                    <span class="email-display" id="userEmail">seu email</span>
                </p>
            </div>

            <div class="input-group">
                <div class="input-box">
                    <div class="code_inputs" id="codeInputs">
                        <input type="text" maxlength="1" id="input1" autocomplete="off">
                        <input type="text" maxlength="1" id="input2" autocomplete="off">
                        <input type="text" maxlength="1" id="input3" autocomplete="off">
                        <input type="text" maxlength="1" id="input4" autocomplete="off">
                        <input type="text" maxlength="1" id="input5" autocomplete="off">
                        <input type="text" maxlength="1" id="input6" autocomplete="off">
                    </div>
                </div>
            </div>

            <div class="confirm-button">
                <button onclick="verifyCode()">Confirmar</button>
            </div>

            <div class="resend-code">
                Não recebeu o código? <a href="#" onclick="resendCode(event)">Reenviar</a>
            </div>
        </div>
    </div>
    
    <script src="./assets_senha/codigo_email/script.js"></script>
</body>
</html>
